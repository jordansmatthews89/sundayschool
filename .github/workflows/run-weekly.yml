# Family Faith weekly agent: generate newsletter + social content every Monday.
# Add repo secrets: OPENAI_API_KEY. Optional: BEEHIIV_API_KEY (for --draft).
name: Weekly agent

on:
  schedule:
    # 9 AM UTC Mondays (adjust cron as needed)
    - cron: '0 9 * * 1'
  workflow_dispatch: # allow manual run

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install agent deps
        run: cd agent && npm install

      - name: Run weekly agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
        run: cd agent && node run-weekly.js
        continue-on-error: true

      - name: Write dashboard snapshot
        run: node agent/write-dashboard.js

      - name: Upload output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-output-${{ github.run_number }}
          path: agent/output/
          retention-days: 30

      - name: Commit config, output, and dashboard
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agent/config.json agent/output/ site/data/dashboard.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Agent run $(date -I)" && git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
